<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Talent Shield</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { width: 100%; max-width: 420px; }
        .auth-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header .logo { font-size: 48px; display: block; }
        .auth-header h1 { font-size: 28px; color: #1A1A2E; margin-top: 10px; }
        .auth-header p { color: #6B7280; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #1A1A2E; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #E5E7EB; border-radius: 10px; font-size: 14px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #6C3CE1; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #6C3CE1, #5A2BC4); color: white; box-shadow: 0 4px 20px rgba(108, 60, 225, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108, 60, 225, 0.4); }
        .auth-footer { text-align: center; margin-top: 20px; color: #6B7280; }
        .auth-footer a { color: #6C3CE1; text-decoration: none; font-weight: 600; }
        .back-home { text-align: center; margin-top: 15px; }
        .back-home a { color: white; text-decoration: none; opacity: 0.8; }
        .back-home a:hover { opacity: 1; }
        .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
        .alert-error { background: #FEE2E2; color: #DC2626; }
        .alert-success { background: #D1FAE5; color: #065F46; }
        .password-strength { font-size: 12px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <span class="logo">🛡️</span>
                <h1>Talent Shield</h1>
                <p>Set new password</p>
            </div>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter new password" required>
                    <div class="password-strength" id="strength-text">Password must be at least 10 characters</div>
                </div>
                <div class="form-group">
                    <label for="password2">Confirm Password</label>
                    <input type="password" id="password2" name="password2" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary">Reset Password</button>
            </form>
            
            <div class="auth-footer">
                <p><a href="{% url 'login' %}">← Back to Login</a></p>
            </div>
        </div>
        <div class="back-home">
            <a href="/">← Back to Home</a>
        </div>
    </div>
    <script>
        document.getElementById('password').addEventListener('input', function() {
            var val = this.value;
            var text = document.getElementById('strength-text');
            if (val.length >= 10) {
                text.textContent = '✅ Strong password';
                text.style.color = '#10B981';
            } else {
                text.textContent = '❌ Password must be at least 10 characters';
                text.style.color = '#EF4444';
            }
        });
    </script>
</body>
</html>

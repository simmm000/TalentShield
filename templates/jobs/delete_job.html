<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Job - Talent Shield</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 500px; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        .icon { font-size: 64px; display: block; margin-bottom: 16px; }
        h1 { color: #1A1A2E; margin-bottom: 10px; }
        p { color: #6B7280; margin-bottom: 8px; }
        .job-title { font-weight: 600; color: #1A1A2E; }
        .buttons { display: flex; gap: 12px; margin-top: 24px; justify-content: center; }
        .btn { display: inline-block; padding: 12px 30px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-danger { background: #EF4444; color: white; }
        .btn-danger:hover { background: #DC2626; }
        .btn-secondary { background: #E5E7EB; color: #1A1A2E; }
        .btn-secondary:hover { background: #D1D5DB; }
        .btn-primary { background: #6C3CE1; color: white; }
        .btn-primary:hover { background: #5A2BC4; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
        .alert-warning { background: #FEF3C7; color: #92400E; }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">🗑️</span>
        <h1>Delete Job</h1>
        <p>Are you sure you want to delete this job?</p>
        <p class="job-title">"{{ job.title }}" at {{ job.company }}</p>
        <p style="font-size:14px; color:#EF4444; margin-top:12px;">⚠️ This action cannot be undone!</p>
        
        <div class="buttons">
            <a href="{% url 'my_jobs' %}" class="btn btn-secondary">Cancel</a>
            <a href="{% url 'delete_job' job.id %}?confirm=yes" class="btn btn-danger">Yes, Delete</a>
        </div>
    </div>
</body>
</html>
